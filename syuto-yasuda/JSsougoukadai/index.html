<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS総合課題</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <div class="gameArea">
        <div class="characterStatus">
          <div class="statusText">HP:<span id="hp">100</span></div>
          <div class="statusText">攻撃力:<span id="attack">10</span></div>
          <div class="statusText">レベル:<span id="level">1</span></div>
        </div>
        <div class="imageContainer">
          <img src="syuzinnkou.jpeg" alt="主人公の画像" class="playerImage" />
        </div>
        <div class="clickBtn">
          <img
            src="direction.png"
            alt="上矢印"
            class="direction top"
            id="upBtn"
          />
          <div class="rightLeft">
            <img
              src="direction.png"
              alt="左矢印"
              class="direction left"
              id="leftBtn"
            />
            <img
              src="direction.png"
              alt="右矢印"
              class="direction right"
              id="rightBtn"
            />
          </div>
          <img
            src="direction.png"
            alt="下矢印"
            class="direction down"
            id="downBtn"
          />
        </div>
      </div>
      <div class="logArea">ログ</div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
