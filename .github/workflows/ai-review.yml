name: AI Review

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > diff.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review with OpenAI
        run: |
          DIFF=$(jq -Rs . < diff.txt)

          curl -s https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": \"あなたは株式会社Hello worldの未経験エンジニア研修講師です。以下のPR差分をレビューしてください。必ず初心者向けに優しく説明してください。出力形式は、# 総合評価(100点満点)、# 良かった点(3つ)、# 改善点(3つ)、# 次に意識すること、の順にしてください。\\n\\n差分:\\n${DIFF}\"
            }" > response.json

          cat response.json

          jq -r '.output_text // .output[0].content[0].text // "AIレビューの生成に失敗しました。Actionsログの response.json を確認してください。"' response.json > review.txt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Comment PR
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -f body="$(cat review.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
