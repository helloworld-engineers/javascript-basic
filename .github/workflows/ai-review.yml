name: AI Review

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Get PR diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > diff.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review with OpenAI
        run: |
          PROMPT=$(jq -Rs . < diff.txt)

          curl -s https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": \"あなたは株式会社Hello worldの未経験エンジニア研修講師です。以下のPR差分をレビューしてください。出力形式は、総合評価点、良かった点3つ、改善点3つ、次に意識すること、の順です。優しく初心者向けに説明してください。\\n\\n差分:\\n${PROMPT}\"
            }" > response.json

          cat response.json
          jq -r '.output_text // .output[0].content[0].text // "AIレビューの生成に失敗しました。response.jsonを確認してください。"' response.json > review.txt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Comment PR
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -f body="$(cat review.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
