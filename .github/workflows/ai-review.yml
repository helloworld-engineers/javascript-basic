name: AI Review

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > diff.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Review
        run: |
          REVIEW=$(curl https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @- <<'JSON' | jq -r '.output_text'
          {
            "model": "gpt-4.1-mini",
            "input": [
              {
                "role": "system",
                "content": "あなたは株式会社Hello worldの未経験エンジニア研修の講師です。PR差分をレビューしてください。厳しすぎず、研修生が次に何を直せばよいか分かるように説明してください。"
              },
              {
                "role": "user",
                "content": "以下のPR差分をレビューしてください。出力形式は、総合評価点、良かった点3つ、改善点3つ、次に意識すること、の順にしてください。\n\n$(cat diff.txt)"
              }
            ]
          }
          JSON
          )

          gh pr comment ${{ github.event.pull_request.number }} --body "$REVIEW"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
