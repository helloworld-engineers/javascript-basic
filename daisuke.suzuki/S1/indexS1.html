<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ダイスゲーム</title>
    <link rel="stylesheet" href="styleS1.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="player">プレイヤー1</div>
        <div class="dice-area">
          <div id="dice1" class="dice">
            <img id="dice1pc" src="1.jpg" class="dicepc" />
          </div>
          <div id="dice2" class="dice">
            <img id="dice2pc" src="1.jpg" class="dicepc" />
          </div>
        </div>
        <div class="player">プレイヤー2</div>
        <div class="bottom-area">
          <button id="battleBtn" class="b-box">勝負</button>
          <div id="result" class="b-box">勝敗</div>
        </div>
      </div>
      <div class="info">
        <p id="round">ラウンド数 : 0 ラウンド</p>
        <p id="score1">プレイヤー1 : 0 ポイント</p>
        <p id="score2">プレイヤー2 : 0 ポイント</p>
      </div>
    </div>
    <script src="scriptS1.js"></script>
  </body>
</html>
