<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>RPG</title>
    <link rel="stylesheet" href="styleSaisyu.css" />
  </head>

  <body>
    <div id="app">
      <!--left area-->
      <div class="left-area">
        <!--status-->
        <div class="status">
          <p class="statusText"><span id="player-level">レベル:1</span></p>
          <p class="statusText"><span id="player-hp">HP:100</span></p>
          <p class="statusText"><span id="player-attack">攻撃力:10</span></p>
        </div>
        <!--map-->
        <div id="map-screen" class="grass-map">
          <div id="map-view" class="view">
            <img src="image/player.png" alt="player" class="character" id="player" />
          </div>
          <!--controller-->
          <div id="controller" class="controller">
            <button id="UP" class="c-button">⇧</button>
            <button id="RIGHT" class="c-button">⇨</button>
            <button id="DOWN" class="c-button">⇩</button>
            <button id="LEFT" class="c-button">⇦</button>
          </div>
        </div>
        <!--battle-->
        <div id="battle-screen" class="battle-background">
          <div id="battle-view" class="view">
            <img id="enemy-img" alt="enemy" class="enemy" />
          </div>
          <!--actionbutton-->
          <div class="battle-actions">
            <button id="btn-attack">たたかう</button>
            <button id="btn-escape">にげる</button>
          </div>
        </div>
      </div>

      <!--right area-->
      <div class="right-area">
        <div class="log-area">
          <h3 class="logTitle">ログ</h3>
          <ul id="log-list"></ul>
        </div>
      </div>
    </div>
    <script src="scriptSaisyu.js"></script>
  </body>
</html>
